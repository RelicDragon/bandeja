<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Bandeja" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#f9fafb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Bandeja Padel</title>
    <meta name="description" content="Ultimate Padel game management and social platform" />

    <meta property="og:url" content="https://bandeja.me/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Bandeja Padel">
    <meta property="og:description" content="Ultimate Padel game management and social platform">
    <meta property="og:image" content="/bandeja2-blue-45-icon.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="bandeja.me">
    <meta property="twitter:url" content="https://bandeja.me/">
    <meta name="twitter:title" content="Bandeja Padel">
    <meta name="twitter:description" content="Ultimate Padel game management and social platform">
    <meta name="twitter:image" content="/bandeja2-blue-45-icon.png">

    <link rel="preload" href="/bandeja2-white-tr.png" as="image" />
    <style>
      html,
      body {
        margin: 0;
        background-color: #abdee3;
      }

      html.app-ready,
      html.app-ready body {
        background-color: var(--ui-page-background, #f9fafb);
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #abdee3;
      }

      #boot-splash img {
        width: 220px;
        height: 220px;
        object-fit: contain;
        animation: bootLogoRotate 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
      }

      @keyframes bootLogoRotate {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(45deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <img src="/bandeja2-white-tr.png" alt="" width="220" height="220" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
