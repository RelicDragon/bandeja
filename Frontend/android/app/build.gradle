apply plugin: 'com.android.application'

def releaseKeystoreProperties = new Properties()
def releaseKeystorePropertiesFile = rootProject.file('keystore.properties')
if (releaseKeystorePropertiesFile.exists()) {
    releaseKeystoreProperties.load(new FileInputStream(releaseKeystorePropertiesFile))
}

def resolveReleaseKeystorePath = {
    def fromEnv = System.getenv('ANDROID_KEYSTORE_FILE')
    if (fromEnv) {
        return file(fromEnv)
    }
    def fromProps = releaseKeystoreProperties['storeFile']
    if (fromProps) {
        return file(fromProps)
    }
    return null
}

def resolveReleaseKeystoreValue = { String propKey, String envKey ->
    def fromEnv = System.getenv(envKey)
    if (fromEnv) {
        return fromEnv
    }
    return releaseKeystoreProperties[propKey]
}

def releaseKeystoreFile = resolveReleaseKeystorePath()
def releaseStorePassword = resolveReleaseKeystoreValue('storePassword', 'ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = resolveReleaseKeystoreValue('keyAlias', 'ANDROID_KEY_ALIAS')
def releaseKeyPassword = resolveReleaseKeystoreValue('keyPassword', 'ANDROID_KEY_PASSWORD')

android {
    namespace = "com.funified.bandeja"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.funified.bandeja"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 159
        versionName "0.96.45"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
            // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (releaseKeystoreFile != null && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                storeFile releaseKeystoreFile
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (releaseKeystoreFile != null && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                signingConfig signingConfigs.release
            } else {
                logger.lifecycle(
                    'Release signing not configured. Create Frontend/android/keystore.properties ' +
                    '(see keystore.properties.example) or set ANDROID_KEYSTORE_* env vars.'
                )
            }
            ndk {
                debugSymbolLevel 'FULL'
            }
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }
    
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    packagingOptions {
        resources {
            excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE', 'META-INF/LICENSE.txt', 'META-INF/license.txt', 'META-INF/NOTICE', 'META-INF/NOTICE.txt', 'META-INF/notice.txt', 'META-INF/ASL2.0', 'META-INF/*.kotlin_module']
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-messaging'
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
