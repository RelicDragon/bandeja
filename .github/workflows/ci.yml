name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Backend/package-lock.json
      - run: npm ci
      - run: npm run build:contract
      - run: npm run test --prefix ../packages/chat-contract
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run build:contract
      - run: npm run lint
      - run: npm run test:chat-open
      - run: npm run test:chat-inbox-feed
      - run: npm run test:queries
      - run: npm run test:live-scoring
      - run: npm run build

  watch-serve-guide:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
        working-directory: Frontend
      - run: bash ios/scripts/run-watch-serve-guide-golden-tests.sh
        working-directory: Frontend
      - run: bash ios/scripts/run-watch-scoring-golden-tests.sh
        working-directory: Frontend
      - run: bash ios/scripts/run-watch-unit-tests.sh
        working-directory: Frontend

  deploy:
    name: Deploy production
    needs: [backend, frontend, watch-serve-guide]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [[ -z "${DEPLOY_SSH_KEY}" ]]; then
            echo "DEPLOY_SSH_KEY secret is not set — add deploy key in repo Settings → Secrets" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" | tr -d '\r' > ~/.ssh/id_hetzner
          chmod 600 ~/.ssh/id_hetzner
          ssh-keyscan -4 -H back.bandeja.com front.bandeja.com >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -4 -o IdentitiesOnly=yes -o BatchMode=yes -i ~/.ssh/id_hetzner relic@back.bandeja.com 'echo backend-ssh-ok'
          ssh -4 -o IdentitiesOnly=yes -o BatchMode=yes -i ~/.ssh/id_hetzner relic@front.bandeja.com 'echo frontend-ssh-ok'
      - name: Deploy (auto BE/FE from diff)
        env:
          UPD_SSH_KEY: ~/.ssh/id_hetzner
        run: ./upd.sh
