name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Backend/package-lock.json
      - run: npm ci
      - run: npm run build:contract
      - run: npm run test --prefix ../packages/chat-contract
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run build:contract
      - run: npm run lint
      - run: npm run test:chat-open
      - run: npm run test:chat-inbox-feed
      - run: npm run test:queries
      - run: npm run test:live-scoring
      - run: npm run build

  watch-serve-guide:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
        working-directory: Frontend
      - run: bash ios/scripts/run-watch-serve-guide-golden-tests.sh
        working-directory: Frontend
      - run: bash ios/scripts/run-watch-scoring-golden-tests.sh
        working-directory: Frontend
