name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Backend/package-lock.json
      - run: npm ci
      - run: npm run build:contract
      - run: npm run build:unread-contract
      - run: npm run build:shared
      - run: npm run test --prefix ../packages/chat-contract
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run test:security
        env:
          # Suite imports route modules that construct PrismaClient; no DB queries.
          DB_URL: postgresql://ci:ci@127.0.0.1:5432/ci_security
          JWT_SECRET: ci-security-test-secret-min-32-chars!!
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run build:contracts
      - run: node --test ../scripts/deploy-frontend.contract.test.mjs
      - run: npm run lint
      - run: npm run test:deep-link-catalog
      - run: npm run test:next-game
      - run: npm run test:chat-open
      - run: npm run test:chat-inbox-feed
      - run: npm run test:chat-drafts
      - run: npm run test:queries
      - run: npm run test:invites
      - run: npm run test:live-scoring
      - run: npx playwright install --with-deps chromium
      - run: npm run test:game-results-share
      - run: npm run build

  ios-shared-packages:
    name: iOS shared packages (#275)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: BandejaNextGames + BandejaWatchShared
        working-directory: Frontend
        run: npm run test:ios-shared-packages

  deploy:
    name: Deploy production
    needs: [backend, frontend, ios-shared-packages]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 60
    env:
      UPD_BE_HOST: local
      UPD_FE_HOST: relic@10.0.0.2
      UPD_SSH_BATCH_MODE: yes
      UPD_SSH_CONNECT_TIMEOUT: 15
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure SSH
        timeout-minutes: 2
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [[ -z "${DEPLOY_SSH_KEY}" ]]; then
            echo "DEPLOY_SSH_KEY secret is not set — add deploy key in repo Settings → Secrets" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" | tr -d '\r' > ~/.ssh/id_hetzner
          chmod 600 ~/.ssh/id_hetzner
          ssh-keyscan -4 -H 127.0.0.1 10.0.0.2 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -4 -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=15 -o ConnectionAttempts=2 -i ~/.ssh/id_hetzner relic@127.0.0.1 'echo backend-ssh-ok'
          ssh -4 -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=15 -o ConnectionAttempts=2 -i ~/.ssh/id_hetzner relic@10.0.0.2 'echo frontend-ssh-ok'
      - name: Deploy (auto BE/FE from diff)
        timeout-minutes: 55
        env:
          UPD_SSH_KEY: ~/.ssh/id_hetzner
        run: ./upd.sh
